services:
  warden:
    build: .
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  database:
    image: postgres:16-alpine
    container_name: warden-database
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: warden
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: warden-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
    redis-data: